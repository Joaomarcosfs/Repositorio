<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D20 RPG - Rolador de Dado</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container d-flex flex-column min-vh-100">

        <!-- Header -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-warning sticky-top">
            <div class="container">
                <a class="navbar-brand fw-bold fs-3 text-warning" href="index.html">
                    <i class="bi bi-dice-6-fill"></i> RPG GAMES
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto align-items-center">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">
                                <i class="bi bi-dice-6"></i> D20 Rolador
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active text-info fw-bold" href="adivinhar.html">
                                <i class="bi bi-target"></i> Adivinhe o Número
                            </a>
                        </li>

                        <li class="nav-item ms-3">
                            <a href="index.html" class="btn btn-outline-warning btn-sm">
                                <i class="bi bi-arrow-left"></i> Voltar aos Dados
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="flex-grow-1 d-flex align-items-center justify-content-center">
            <div class="card bg-dark border-warning shadow-lg" style="max-width: 480px; width: 100%;">
                <div class="card-body p-5 text-center">

                    <!-- Área do Dado -->
                    <div id="dado" class="dado mx-auto mb-4">
                        <span id="resultado" class="numero">?</span>
                    </div>

                    <div class="d-grid gap-3">
                        <button onclick="rolarDado()" class="btn btn-warning btn-lg py-3 fw-bold fs-4">
                            <i class="bi bi-arrow-clockwise me-2"></i> ROLAR D20
                        </button>

                        <button onclick="limpar()" class="btn btn-outline-danger btn-lg py-3">
                            <i class="bi bi-trash"></i> LIMPAR
                        </button>
                    </div>

                    <!-- Histórico -->
                    <div class="mt-5">
                        <h5 class="text-warning mb-3">Histórico de Rolagens</h5>
                        <div id="historico" class="historico text-start"></div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="text-center py-4 text-white-50 small">
            Feito com ❤️ para jogadores de RPG • João Marcos
        </footer>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Seu JavaScript -->
    <script src="js/script.js"></script>
</body>

</html>
